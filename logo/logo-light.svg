<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <!-- Gradient for the icon background -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B6CA8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D4F82;stop-opacity:1" />
    </linearGradient>
    <!-- Gradient for the lightning bolt accent -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F6821F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E06010;stop-opacity:1" />
    </linearGradient>
    <!-- Subtle glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Icon container: rounded square ── -->
  <rect x="4" y="8" width="64" height="64" rx="16" ry="16" fill="url(#iconGrad)" />

  <!-- Subtle inner highlight -->
  <rect x="4" y="8" width="64" height="32" rx="16" ry="16" fill="white" opacity="0.06" />

  <!-- ── Person / HR silhouette ── -->
  <!-- Head -->
  <circle cx="36" cy="27" r="9" fill="white" opacity="0.92"/>
  <!-- Body (shoulders arc) -->
  <path d="M18 58 Q18 44 36 44 Q54 44 54 58" fill="white" opacity="0.92"/>

  <!-- ── Lightning bolt (AI accent) ── -->
  <!-- Positioned bottom-right of icon, overlapping -->
  <circle cx="57" cy="57" r="11" fill="url(#boltGrad)" />
  <path d="M59 48 L54 57 L58 57 L55 66 L62 55 L58 55 Z" fill="white" opacity="0.95" />

  <!-- ── Wordmark ── -->
  <!-- "HR" bold -->
  <text x="82" y="43" 
        font-family="'Segoe UI', 'Inter', Arial, sans-serif" 
        font-size="28" 
        font-weight="700" 
        fill="#1A1A2E" 
        letter-spacing="-0.5">HR</text>

  <!-- Divider dot -->
  <circle cx="122" cy="38" r="3" fill="#F6821F"/>

  <!-- "Agent" lighter weight -->
  <text x="130" y="43" 
        font-family="'Segoe UI', 'Inter', Arial, sans-serif" 
        font-size="28" 
        font-weight="300" 
        fill="#1B6CA8" 
        letter-spacing="-0.5">Agent</text>

  <!-- Tagline -->
  <text x="82" y="58" 
        font-family="'Segoe UI', 'Inter', Arial, sans-serif" 
        font-size="11" 
        font-weight="400" 
        fill="#6B7280" 
        letter-spacing="2">POWERED BY CLOUDFLARE</text>
</svg>
